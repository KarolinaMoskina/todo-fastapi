# Storage DB
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/postgres"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  volumeName: postgres-pv
---

# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
data:
  POSTGRES_HOST: db-service
  POSTGRES_DB: todo_db

---

# DB
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-db
  template:
    metadata:
      labels:
        app: todo-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        envFrom:
        - configMapRef:
            name: todo-config
        - secretRef:
            name: todo-secret
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
    app: todo-db
  ports:
  - port: 5432
    targetPort: 5432
---

# Deployment и Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-web
  template:
    metadata:
      labels:
        app: todo-web
    spec:
      containers:
      - name: web
        image: todo-web:latest
        imagePullPolicy: Never
        command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"]
        envFrom:
        - configMapRef:
            name: todo-config
        - secretRef:
            name: todo-secret
        ports:
        - containerPort: 8000
        
        # HEALTH CHECKS
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 12
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 12
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: NodePort
  selector:
    app: todo-web
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080